site_name: HKPUG PyPI 30-Day CTF
site_description: Learn PyPI by hacking a safe toy package ecosystem.
site_url: https://alex-au-922.github.io/HKPUG-Meetup-PyPI-Challenge/
repo_url: https://github.com/alex-au-922/HKPUG-Meetup-PyPI-Challenge
repo_name: alex-au-922/HKPUG-Meetup-PyPI-Challenge

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - styles/scoreboard.css

extra_javascript:
  - assets/scoreboard.js

nav:
  - Home: index.md
  - Rules: rules.md
  - How To Play: WORKING_FORMAT.md
  - Hints: hints.md
  - Scoreboard: scoreboard.md
  - Tutorials:
      - Tutorial Index: tutorials/README.md
      - How To Play: tutorials/00-how-to-play.md
      - Pip Index Basics: tutorials/01-pip-index-basics.md
      - Package Build Artifacts: tutorials/02-package-build-artifacts.md
      - Legacy Vs Modern Packaging: tutorials/03-legacy-vs-modern-packaging.md
      - Submission And Certificates: tutorials/04-submission-and-certificates.md
      - Reading Pip Output: tutorials/05-reading-pip-output.md
      - Submission PR Workflow: tutorials/06-submission-pr-workflow.md
  - Labs:
      - Lab Index: labs/index.md
      - Flag 01 Index Recon: labs/flag-01-index-recon.md
      - Flag 02 Name Maze: labs/flag-02-name-maze.md
      - Flag 03 Resolver Duel: labs/flag-03-resolver-duel.md
      - Flag 04 Dependency Confusion: labs/flag-04-dependency-confusion.md
      - Flag 05 Wheel Autopsy: labs/flag-05-wheel-autopsy.md
      - Flag 06 Entry Point Ambush: labs/flag-06-entry-point-ambush.md
      - Flag 07 Legacy Sdist Trap: labs/flag-07-legacy-sdist-trap.md
      - Flag 08 Build Isolation Lab: labs/flag-08-build-isolation-lab.md
      - Flag 09 Startup Surprise: labs/flag-09-startup-surprise.md
      - Flag 10 Pin Hash Lock: labs/flag-10-pin-hash-lock.md
      - Flag 11 CI Publisher Trap: labs/flag-11-ci-publisher-trap.md
      - Flag 12 Capstone Incident: labs/flag-12-capstone-incident.md
